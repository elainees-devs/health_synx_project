{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-sm p-4" style="width: 100%; max-width: 400px;">
        <h2 class="card-title text-center mb-4">Login</h2>
        <form method="post">
            {% csrf_token %}
            
            <!-- Username -->
            <div class="mb-3">
                <label for="id_username" class="form-label">Username</label>
                <input type="text" name="username" maxlength="150" autofocus required id="id_username"
                       class="form-control" value="{{ form.username.value|default_if_none:'' }}">
                {% if form.username.errors %}
                    <div class="text-danger small mt-1">
                        {{ form.username.errors }}
                    </div>
                {% endif %}
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label for="id_password" class="form-label">Password</label>
                <input type="password" name="password" required id="id_password" class="form-control">
                {% if form.password.errors %}
                    <div class="text-danger small mt-1">
                        {{ form.password.errors }}
                    </div>
                {% endif %}
            </div>

            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>

        <p class="mt-3 text-center">
            Don't have an account? <a href="{% url 'register' %}">Register</a>
        </p>
    </div>
</div>
{% endblock %}
